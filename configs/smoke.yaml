# SPRIG v0.1 smoke config (DESIGN.md section 7): tiny model, 200 steps.
# Must run CPU-only on the Mac AND on klaus-1 GPU (device: auto).
run_name: smoke
seed: 0
device: auto

model:
  S: 128
  R: 16
  T_v: 32
  d: 128
  n_heads: 8       # must divide d (SPRIGConfig default of 6 does not divide 128)
  canvas: 64
  grid: 8
  emb_dim: 768
  L_max: 64

data:
  train_dir: ~/data/sprig/proc2d/train
  val_dir: ~/data/sprig/proc2d/val
  val_fast_dir: ~/data/sprig/proc2d/val_fast
  parse_eval_dir: ~/data/sprig/proc2d/parse_eval
  null_emb: ~/data/sprig/t5/null.f16
  p_null: 0.10
  num_workers: 2

train:
  batch_size: 32
  total_steps: 200
  lr_tables: 3.0e-4
  lr_networks: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0
  warmup_steps: 20
  lr_decay_steps: 200
  lr_min_ratio: 0.10
  grad_clip: 1.0
  ema: 0.9999
  tau_start: 2.0
  tau_end: 1.0
  tau_steps: 100
  eta_update_every: 50
  eta_band: [0.5, 3.0]
  eta_max: 1.5
  eta_step_up: 0.05
  eta_step_down: 0.05
  eta_final_anneal_steps: 20
  texel_dead_frac: 0.1
  tier_schedule:
    - {until: 60,  weights: [0.55, 0.35, 0.10, 0.00]}
    - {until: 120, weights: [0.25, 0.35, 0.30, 0.10]}
    - {until: null, weights: [0.10, 0.30, 0.40, 0.20]}

eval:
  scalars_every: 20
  val_fast_every: 50
  parse_every: 100
  full_every: 200
  val_fast_n: 64
  full_val_n: 128
  parse_images: 8
  prompt_grid_n: 4
  bank_seeds: 2
  eval_batch_size: 16
  prompt_bank_emb: ~/data/sprig/t5/prompt_bank.pt

checkpoint:
  every_minutes: 30
  every_steps: 100
